<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juliette Psicose 2D - Jogo 800x600</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="gameContainer">
        <div class="game-info">
            Juliette Psicose 2D - 800x600
        </div>
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <button id="fullscreenBtn" class="fullscreen-btn" title="Tela Cheia (F11)">
            📺 TELA CHEIA
        </button>
        <div class="controls">
            🏃 Setas: Mover/Mirar | ⚔️ Espaço/X: Atirar | 🦘 Z: Pular | ⏸ P: Pausar | 🔄 R: Reiniciar<br>
            🎯 Múltiplas armas | 💎 Power-ups | 👾 Inimigos inteligentes | 💥 Explosões épicas!
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
